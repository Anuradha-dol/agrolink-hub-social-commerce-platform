<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 82" role="img" aria-labelledby="title desc">
  <title id="title">AgroLink Hub</title>
  <desc id="desc">Interlinked blue and green AgroLink Hub logo.</desc>
  <defs>
    <linearGradient id="agroLinkMark" x1="11" y1="12" x2="75" y2="73" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563eb"/>
      <stop offset=".52" stop-color="#1fcf76"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="agroLinkWord" x1="92" y1="28" x2="243" y2="58" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0f1f3d"/>
      <stop offset=".56" stop-color="#102650"/>
      <stop offset=".57" stop-color="#16a34a"/>
      <stop offset="1" stop-color="#0f9f5f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f766e" flood-opacity=".14"/>
    </filter>
  </defs>
  <g filter="url(#softShadow)">
    <rect x="4" y="4" width="74" height="74" rx="22" fill="#fff"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="8">
      <path d="M42 17c11 0 20 9 20 20 0 10-8 18-18 19" stroke="#2563eb"/>
      <path d="M45 56c-8 9-23 8-30-2-7-10-3-24 9-29" stroke="#1fcf76"/>
      <path d="M24 25c6-11 22-13 31-4" stroke="#2f6df6"/>
      <path d="M15 54c9 10 25 10 34 0" stroke="#18b967"/>
      <path d="M62 37c8 2 13 10 12 19-2 12-15 19-26 13" stroke="#1fcf76"/>
    </g>
    <circle cx="42" cy="17" r="7" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
    <circle cx="24" cy="25" r="7" fill="#f0fdf4" stroke="#1fcf76" stroke-width="4"/>
    <circle cx="45" cy="56" r="7" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
  </g>
  <g>
    <text x="93" y="39" fill="url(#agroLinkWord)" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="27" font-weight="800">AgroLink</text>
    <text x="205" y="39" fill="#16a34a" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="27" font-weight="800">Hub</text>
    <text x="94" y="61" fill="#48607a" font-family="Poppins, Montserrat, Arial, sans-serif" font-size="13" font-weight="500">Connect. Share. Sell.</text>
  </g>
</svg>
