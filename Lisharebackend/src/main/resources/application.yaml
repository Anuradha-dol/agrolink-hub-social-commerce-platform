spring:
  application:
    name: Lishare

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bodlyy_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    defer-datasource-initialization: false

  sql:
    init:
      mode: always

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB


file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}

server:
  port: ${SERVER_PORT:4041}

jwt:
  secret: ${JWT_SECRET:}
  access-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  verify-expiration-ms: ${JWT_VERIFY_EXPIRATION_MS:1800000}

cookie:
  secure: ${COOKIE_SECURE:false}
  same-site: ${COOKIE_SAME_SITE:Lax}
  domain: ${COOKIE_DOMAIN:}
  path: ${COOKIE_PATH:/}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

logging:
  level:
    org.springframework.web.socket.config.WebSocketMessageBrokerStats: WARN
